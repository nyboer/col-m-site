<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>col-m</title>
  <meta name="description" content="A monthly music series.">
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --border:   #2a2a2a;
      --text:     #e8e4dc;
      --muted:    #7a7570;
      --accent:   #c8b89a;
      --max-w:    860px;
      --gap:      2.5rem;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 1rem;
      line-height: 1.65;
      min-height: 100vh;
    }

    /* ── Layout ───────────────────────────────────────────── */
    .site-wrap {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    /* ── Header ───────────────────────────────────────────── */
    .site-header {
      padding: 3.5rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--gap);
    }

    .site-header h1 {
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      color: var(--text);
    }

    .site-header .tagline {
      margin-top: 0.4rem;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Events list ──────────────────────────────────────── */
    .events {
      display: flex;
      flex-direction: column;
      gap: calc(var(--gap) * 1.5);
      padding-bottom: 4rem;
    }

    /* ── Single event ─────────────────────────────────────── */
    .event {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
      padding-bottom: calc(var(--gap) * 1.5);
      border-bottom: 1px solid var(--border);
    }

    .event:last-child { border-bottom: none; }

    /* Poster */
    .event__poster { position: relative; }

    .poster {
      width: 100%;
      display: block;
      border: 1px solid var(--border);
    }

    .poster--placeholder {
      aspect-ratio: 3/4;
      background: var(--surface);
    }

    /* Info */
    .event__info {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-top: 0.25rem;
    }

    .event__title {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1.3;
    }

    .event__date {
      color: var(--accent);
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .artists {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .artists li {
      font-size: 1rem;
      color: var(--text);
    }

    .artists li::before {
      content: "– ";
      color: var(--muted);
    }

    .event__details {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .description {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.7;
      border-left: 2px solid var(--border);
      padding-left: 1rem;
    }

    /* ── Footer ───────────────────────────────────────────── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 0 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .site-footer p {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .site-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .site-footer a:hover { text-decoration: underline; }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 580px) {
      .event {
        grid-template-columns: 1fr;
        gap: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="site-wrap">

    <header class="site-header">
      <h1>col&#8209;m</h1>
      <p class="tagline">Monthly Music Series</p>
    </header>

    <main class="events">
      {{ EVENTS }}
    </main>

    <footer class="site-footer">
      <p>col&#8209;m &mdash; <a href="https://instagram.com/" target="_blank" rel="noopener">@col_m</a></p>
      <p>Updated {{ UPDATED }}</p>
    </footer>

  </div>
</body>
</html>
